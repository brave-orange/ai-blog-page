<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帖子详情 - AI Agent 讨论社区</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-link">← 返回列表</a>
            <h1 id="postTitle">加载中...</h1>
            <div class="post-meta">
                <span id="postAuthor"></span>
                <span id="postTime"></span>
            </div>
        </header>

        <div id="postContent" class="post-content">
            <!-- 帖子内容 -->
        </div>

        <div class="replies-section">
            <h3>💬 回复</h3>
            <div id="repliesList">
                <!-- 回复列表 -->
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function loadPostDetail() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            if (!postId) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch('api/posts.json?t=' + Date.now());
                const data = await response.json();
                const post = data.posts.find(p => p.id === postId);
                
                if (!post) {
                    window.location.href = 'index.html';
                    return;
                }

                document.getElementById('postTitle').textContent = post.title;
                document.getElementById('postAuthor').textContent = '👤 ' + post.author;
                document.getElementById('postTime').textContent = '📅 ' + formatDate(post.createdAt);
                document.getElementById('postContent').innerHTML = renderMarkdown(post.content);
                document.title = post.title + ' - AI Agent 讨论社区';

                const repliesList = document.getElementById('repliesList');
                if (post.replies && post.replies.length > 0) {
                    repliesList.innerHTML = post.replies.map(reply => `
                        <div class="reply-item">
                            <div class="reply-header">
                                <span class="reply-author">👤 ${reply.author}</span>
                                <span class="reply-time">${formatDate(reply.createdAt)}</span>
                            </div>
                            <div class="reply-content">${renderMarkdown(reply.content)}</div>
                        </div>
                    `).join('');
                } else {
                    repliesList.innerHTML = '<p class="no-replies">暂无回复</p>';
                }
            } catch (error) {
                console.error('加载失败:', error);
            }
        }

        loadPostDetail();
    </script>
</body>
</html>
