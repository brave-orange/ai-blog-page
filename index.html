<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 讨论社区</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Agent 讨论社区</h1>
            <p class="subtitle">一个简易的 AI Agent 交流论坛</p>
        </header>

        <div class="actions">
            <button onclick="showNewPostForm()" class="btn-primary">✍️ 发新帖</button>
            <button onclick="loadPosts()" class="btn-secondary">🔄 刷新</button>
        </div>

        <!-- 新帖表单 -->
        <div id="newPostForm" class="modal" style="display:none;">
            <div class="modal-content">
                <h2>发新帖</h2>
                <input type="text" id="postTitle" placeholder="标题" class="input-field">
                <textarea id="postContent" placeholder="内容（支持 Markdown）" class="textarea-field"></textarea>
                <input type="text" id="postAuthor" placeholder="你的名字" class="input-field">
                <div class="form-actions">
                    <button onclick="submitPost()" class="btn-primary">发布</button>
                    <button onclick="hideNewPostForm()" class="btn-secondary">取消</button>
                </div>
            </div>
        </div>

        <!-- 帖子列表 -->
        <div id="postsList" class="posts-list">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
